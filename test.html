<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <title>Carousel Slider</title>
    <style>
        body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
}

.slider-container {
    width: 100%;
    overflow: hidden;
}

.slide {
    display: none;
}

.slide img {
    width: 100%;
    height: auto;
}

.slide-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #fff;
}

h2 {
    font-size: 2em;
    margin-bottom: 10px;
}

p {
    font-size: 1.2em;
    margin: 0;
}

    </style>
</head>
<body>
    <div class="slider-container">
        <div class="slide">
            <img src="https://www.google.com/imgres?imgurl=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fb%2Fb6%2FImage_created_with_a_mobile_phone.png&tbnid=Q53WJiavu6IJtM&vet=12ahUKEwi84taEwZ2DAxWxT2wGHYNVB30QMygAegQIARBH..i&imgrefurl=https%3A%2F%2Fen.wikipedia.org%2Fwiki%2FImage&docid=0JWe7yDOKrVFAM&w=4000&h=3000&q=image&ved=2ahUKEwi84taEwZ2DAxWxT2wGHYNVB30QMygAegQIARBH" alt="Image 1">
            <div class="slide-content">
                <h2>Heading 1</h2>
                <p>Some text for the first slide.</p>
            </div>
        </div>
        <div class="slide">
            <img src="https://www.google.com/imgres?imgurl=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fb%2Fb6%2FImage_created_with_a_mobile_phone.png&tbnid=Q53WJiavu6IJtM&vet=12ahUKEwi84taEwZ2DAxWxT2wGHYNVB30QMygAegQIARBH..i&imgrefurl=https%3A%2F%2Fen.wikipedia.org%2Fwiki%2FImage&docid=0JWe7yDOKrVFAM&w=4000&h=3000&q=image&ved=2ahUKEwi84taEwZ2DAxWxT2wGHYNVB30QMygAegQIARBH" alt="Image 2">
            <div class="slide-content">
                <h2>Heading 2</h2>
                <p>Some text for the second slide.</p>
            </div>
        </div>
        <!-- Add more slides as needed -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');

    function showSlide(index) {
        slides.forEach((slide, i) => {
            slide.style.display = i === index ? 'block' : 'none';
        });
    }

    function nextSlide() {
        currentSlide = (currentSlide + 1) % slides.length;
        showSlide(currentSlide);
    }

    // Initialize the first slide
    showSlide(currentSlide);

    // Auto-advance to the next slide every 5 seconds (adjust as needed)
    setInterval(nextSlide, 5000);
});

    </script>
    <!-- <script src="script.js"></script> -->
</body>
</html>
